<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage Per Day Calculator - ahafidz/usage-cal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090d16;
      --bg-card: rgba(19, 26, 43, 0.75);
      --bg-card-hover: rgba(28, 38, 64, 0.85);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(0, 255, 170, 0.4);
      --accent-green: #00ffaa;
      --accent-blue: #38bdf8;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    .ambient-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(140px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.25;
    }

    .glow-1 { top: -100px; left: -100px; background: var(--accent-green); }
    .glow-2 { bottom: -150px; right: -100px; background: var(--accent-blue); }

    .container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      z-index: 1;
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 40px 0 28px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 36px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .back-btn, .repo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-main);
      text-decoration: none;
      transition: var(--transition);
    }

    .back-btn:hover, .repo-badge:hover {
      background: rgba(0, 255, 170, 0.12);
      border-color: var(--accent-green);
      color: var(--accent-green);
      transform: translateY(-2px);
    }

    .repo-badge {
      font-family: 'Fira Code', monospace;
      color: var(--accent-green);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 60%, #64748b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    main {
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding-bottom: 60px;
    }

    .calc-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .calc-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
    }

    /* Month Progress Bar Card */
    .month-progress {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 16px;
      padding: 24px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .progress-title {
      font-weight: 600;
      font-size: 1rem;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #dateInfo {
      font-family: 'Fira Code', monospace;
      font-weight: 600;
      color: var(--accent-blue);
      font-size: 1.05rem;
      background: rgba(56, 189, 248, 0.1);
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .progress-bar {
      background-color: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
      height: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
    }

    .progress-fill {
      background: linear-gradient(90deg, #38bdf8, #00ffaa);
      height: 100%;
      width: 0;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(0, 255, 170, 0.5);
    }

    /* Form Layout */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 600;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input[type="number"], input[type="date"] {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: var(--transition);
      width: 100%;
    }

    input:focus {
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(0, 255, 170, 0.15);
      background: rgba(28, 38, 64, 0.9);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    input[type="date"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }

    button {
      background: linear-gradient(135deg, var(--accent-green), #059669);
      color: #064e3b;
      border: none;
      border-radius: 14px;
      padding: 16px 28px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 8px 20px -6px rgba(0, 255, 170, 0.4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px -5px rgba(0, 255, 170, 0.6);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(0);
    }

    /* Result Output */
    .result {
      margin-top: 28px;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-main);
      background: rgba(0, 255, 170, 0.08);
      border: 1px solid rgba(0, 255, 170, 0.3);
      border-radius: 14px;
      padding: 20px 24px;
      text-align: center;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .result:empty {
      display: none;
    }

    footer {
      border-top: 1px solid var(--border-color);
      padding: 32px 0;
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-dim);
      margin-top: auto;
    }

    footer a {
      color: var(--accent-green);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .calc-card { padding: 22px; }
      .header-top { flex-direction: column; align-items: stretch; text-align: center; }
      .back-btn, .repo-badge { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="container">
    <header>
      <div class="header-top">
        <a href="index.html" class="back-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to Directory
        </a>
        <a href="https://github.com/ahafidz/usage-cal" target="_blank" rel="noopener noreferrer" class="repo-badge">
          ⚡ ahafidz / usage-cal
        </a>
      </div>
      <h1>Usage Per Day Calculator</h1>
      <p class="subtitle">Monitor consumption limits across any date range with real-time daily allowances and calendar progress tracking.</p>
    </header>

    <main>
      <div class="month-progress">
        <div class="progress-header">
          <div class="progress-title">
            <span>📅</span> Current Day of Month Progress
          </div>
          <div id="dateInfo">Loading...</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="calc-card">
        <div class="form-grid">
          <div class="input-group">
            <label for="currentUsage"><span>📊</span> Current Usage (%)</label>
            <input type="number" id="currentUsage" step="0.01" placeholder="e.g. 1.6 or 45.5">
          </div>

          <div class="input-group">
            <label for="currentDate"><span>🗓️</span> Current Date</label>
            <input type="date" id="currentDate">
          </div>

          <div class="input-group">
            <label for="endDate"><span>🏁</span> End Date</label>
            <input type="date" id="endDate">
          </div>
        </div>

        <button onclick="calculateDailyUsage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          Calculate Daily Allowance
        </button>

        <div class="result" id="result"></div>
      </div>
    </main>

    <footer>
      <p>Usage Per Day Calculator • <a href="index.html">Directory Home</a> • Hosted on GitHub Pages</p>
    </footer>
  </div>

  <script>
    function updateMonthProgress() {
      const today = new Date();
      const currentDay = today.getDate();
      const totalDays = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
      const percent = (currentDay / totalDays) * 100;

      document.getElementById('dateInfo').textContent = `${currentDay}/${totalDays} (${percent.toFixed(2)}%)`;
      document.getElementById('progressFill').style.width = percent.toFixed(2) + '%';
    }

    function calculateDailyUsage() {
      const currentUsage = parseFloat(document.getElementById('currentUsage').value);
      const currentDate = new Date(document.getElementById('currentDate').value);
      const endDate = new Date(document.getElementById('endDate').value);

      if (isNaN(currentUsage) || !currentDate || !endDate || isNaN(currentDate.getTime()) || isNaN(endDate.getTime())) {
        document.getElementById('result').textContent = '⚠️ Please fill in all fields (Current Usage, Current Date, and End Date) correctly.';
        return;
      }

      const oneDay = 1000 * 60 * 60 * 24;
      const daysRemaining = Math.floor((endDate - currentDate) / oneDay);
      const remainingPercent = 100 - currentUsage;
      
      if (daysRemaining <= 0) {
        document.getElementById('result').textContent = `⚠️ End Date must be after the Current Date (days remaining: ${daysRemaining}).`;
        return;
      }

      const dailyAllowance = remainingPercent / daysRemaining;

      document.getElementById('result').innerHTML = `💡 You can use approximately <strong style="color: var(--accent-green); font-size: 1.3em;">${dailyAllowance.toFixed(2)}%</strong> per day for the remaining <strong style="color: var(--accent-blue);">${daysRemaining}</strong> days.`;
    }

    // Auto populate today's date into currentDate input on load for user convenience
    document.addEventListener("DOMContentLoaded", () => {
      updateMonthProgress();
      const todayStr = new Date().toISOString().split('T')[0];
      document.getElementById('currentDate').value = todayStr;
    });
  </script>
</body>
</html>
